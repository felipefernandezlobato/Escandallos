services:
  - type: web
    name: bru-escandallos-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: AUTH_PASSWORD_HASH
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        value: sqlite:///data/escandallos.db
    disk:
      name: data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
